{% extends 'base.html' %}
{% block content %}
<div class="auth">
  <h1>Вход</h1>
  <form method="post" class="form">
    <input name="username" placeholder="Логин или email" required>
    <input type="password" name="password" placeholder="Пароль" required>
    <button class="btn">Войти</button>
  </form>
  <p class="muted">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
</div>
{% endblock %}
